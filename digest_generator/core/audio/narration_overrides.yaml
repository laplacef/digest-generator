# =============================================================================
# Acronyms expanded to full meaning (jargon that's unclear letter-spelled)
# =============================================================================

BYOVD: bring your own vulnerable driver
FGA: fine-grained authorization
KEV: known exploited vulnerabilities
PQC: post-quantum cryptography
SWE: software engineer

# =============================================================================
# Mixed-pronunciation acronyms (industry convention: word form)
# =============================================================================

# SQL maps to "sequel" is the more natural spoken form. Both are common;
# pick one and stick to it for consistency.
SQL: sequel
# WAN maps to "wan" (rhymes with "ran") in networking parlance.
WAN: wan

# =============================================================================
# Brand names + product names with non-obvious pronunciation
# =============================================================================

# Company name pronounced "en-vidia" (the V is rendered as in "envy"
# + "idia"); without this override Piper would over-stress NVI as a
# single syllable.
NVIDIA: en-vidia
# Mid-size SAP is the company, pronounced "S A P" (letters) in
# English speech, even though Germans say "zap".
SAP: S A P
# IBM, AMD intentionally letter-spelled (covered above) since that's
# the industry-standard spoken form.

# =============================================================================
# Units
# =============================================================================
# Numeric+unit pairs (both "800 MW" and "10GW" forms) are handled by the
# `_UNIT_RE` pre-walk normalizer in narration.py, adding entries here is
# redundant for the patterns it covers (GW/MW/GB/MB/KB/TB/Tbps/Gbps/Mbps/Kbps).
# Add unit overrides here only if a unit is voiced without a leading number
# (where the regex wouldn't fire) or for units not yet in `_UNIT_EXPANSIONS`.
