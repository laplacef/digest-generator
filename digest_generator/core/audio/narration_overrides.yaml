# Pronunciation overrides for the audio narration pre-pass.
#
# Maps a token (matched as a whole word, case-sensitive) to its
# speech-friendly form. Applied by narration.markdown_to_narration
# after the markdown AST walk, before Piper synthesis.
#
# Add entries here when listening to a real digest reveals Piper
# mispronouncing a token. Iterate based on output, not speculation,
# but a baseline of common tech acronyms is seeded here from a
# 14-digest audit (2026-05-13).
#
# Treatment choices (per-entry):
# - Letters separated by single spaces ("A W S") maps to Piper pronounces
#   each letter individually. Use for initialisms (AWS, CVE, API).
# - Lowercase word or phonetic spelling ("sisa", "engine-ex") maps to
#   Piper pronounces it as a word. Use for acronyms-as-words.
# - Full English expansion ("multi-factor authentication") maps to Use
#   sparingly, only for jargon-y acronyms that would be unclear
#   to listeners not deep in the field.
#
# Notes:
# - Matcher is whole-word and case-sensitive ("AGI" and "agi" can
#   differ; "MW" in "800 MW" matches but "MW" in "100MW" doesn't,
#   the preceding digit is a word char).
# - Cache key does NOT see edits to this file. After changing an
#   override, force a re-render with `rm -rf <run>/audio` before
#   `digest-generator audio <run>`.
# - Tokens with embedded digits (2FA, EC2, APT41) can't be reliably
#   matched by the current regex; revisit if listening flags them.

# =============================================================================
# Pronounced as words (Piper would likely letter-spell or garble; force word form)
# =============================================================================

BERT: bert
CIBA: see-ba
CISA: sisa
CUDA: koo-duh
DDoS: dee-doss
JSON: jay-son
KEM: kem
KICS: kicks
LDAP: L-dap
NGINX: engine-ex
NIST: nist
OPSEC: op-sek
OWASP: oh-wasp
RAG: rag
RAM: ram
SAML: sam-ull
SANS: sans
SASE: sass-ee
SIEM: seem
SOHO: so-ho

# IaaS/PaaS/SaaS: mixed-case acronyms commonly said as words.
IaaS: eye-ass
PaaS: paas
SaaS: sass

# =============================================================================
# Letter-by-letter initialisms (force Piper to spell each letter)
# =============================================================================

# AI is intentionally not overridden: Piper handles "AI" cleanly and
# the token appears 600+ times per digest; forcing "A I" would feel
# choppy across the whole narration.

AGI: A G I
# API/APIs use hyphenated phonetic respelling: letter-spaced "A P I"
# rendered as "ay pee eye" with stress on each letter; hyphenation
# tightens the gap and reads more naturally given API's ~per-paragraph
# frequency in digest prose.
API: ay-pee-aye
APIs: ay-pee-ayes
APT: A P T
