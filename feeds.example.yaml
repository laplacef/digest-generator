# Example feeds configuration for digest-generator.
#
# Copy this file to one of the locations the loader searches, then edit it:
#
#   ./digest-generator/feeds.yaml        # project-local
#   ~/.config/digest-generator/feeds.yaml # user-level
#
# Or point at it explicitly:  digest-generator run --feeds path/to/feeds.yaml

# Categories are the digest's sections, in order. Each has a stable id and a
# display title. Feeds reference a category by its id. Define your own; the
# ids below are only examples.
categories:
  - id: ai
    title: "AI & Machine Learning"
  - id: engineering
    title: "Engineering"
  - id: security
    title: "Security"

# Each feed needs three fields:
#   name      stable id; becomes the fetch cache filename and each entry's origin
#   url       the RSS/Atom feed URL
#   category  one of the category ids defined above
feeds:
  - name: openai-news
    url: https://openai.com/news/rss.xml
    category: ai

  - name: huggingface-blog
    url: https://huggingface.co/blog/feed.xml
    category: ai

  - name: github-blog
    url: https://github.blog/feed/
    category: engineering

  - name: krebs-on-security
    url: https://krebsonsecurity.com/feed/
    category: security

  - name: the-hacker-news
    url: https://feeds.feedburner.com/TheHackersNews
    category: security
